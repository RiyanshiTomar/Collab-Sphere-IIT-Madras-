<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Collab-Sphere</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* Contact Section */
        .contact-section {
            background: rgba(10, 10, 20, 0.8);
            padding: 4rem 2rem;
            border-radius: 15px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 102, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            margin: 8rem auto;
            animation: fadeInUp 0.8s ease-out;
        }

        .section-title {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #ffffff, #c2d9ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .contact-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--gray);
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem 1.2rem;
            background: rgba(5, 5, 10, 0.4);
            border: 1px solid rgba(0, 102, 255, 0.2);
            border-radius: 8px;
            color: var(--light);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.1);
        }

        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        .submit-btn {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, var(--primary), #00a3ff);
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 102, 255, 0.3);
        }

        /* Success Message */
        .success-message {
            display: none;
            padding: 1.5rem;
            background: rgba(0, 204, 102, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
            border-radius: 8px;
            margin-top: 2rem;
            text-align: center;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .contact-section {
                margin: 6rem 1rem;
                padding: 2rem;
            }
            
            .contact-form {
                grid-template-columns: 1fr;
            }
            
            .section-title {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            .contact-section {
                margin: 4rem 1rem;
                padding: 1.5rem;
            }
            
            .submit-btn {
                width: 100%;
                padding: 1rem;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="bg-circle" style="width: 600px; height: 600px; top: -100px; left: -100px;"></div>
        <div class="bg-circle" style="width: 400px; height: 400px; bottom: -100px; right: -100px; animation-delay: 2s;"></div>
    </div>

    <!-- Navigation -->
    <nav>
        <a href="../../index.html" class="logo">Collab-<span>Sphere</span></a>
        <div class="nav-links">
            <a href="../../index.html">Home</a>
            <a href="faq.html">FAQs</a>
            <a href="ContactUs.html">Contact</a>
            <a href="login.html" class="login-btn">Login</a>
        </div>
    </nav>

    <!-- Contact Section -->
    <section id="contact" class="contact-section">
        <h2 class="section-title">Contact Us</h2>
        <form class="contact-form" id="contactForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" required placeholder="Message subject">
            </div>
            <div class="form-group">
                <label for="message">Your Message</label>
                <textarea id="message" required placeholder="Write your message here..."></textarea>
            </div>
            <button type="submit" class="submit-btn">
                <i class="fas fa-paper-plane"></i>
                Send Message
            </button>
        </form>
        <div class="success-message" id="successMessage">
            Thank you for your message! We'll get back to you soon.
        </div>
    </section>

    <script>
        document.getElementById('contactForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Show success message
            const successMessage = document.getElementById('successMessage');
            successMessage.style.display = 'block';
            
            // Reset form
            contactForm.reset();
            
            // Hide message after 5 seconds
            setTimeout(() => {
                successMessage.style.display = 'none';
            }, 5000);
        });
    </script>
</body>
</html>
