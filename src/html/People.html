<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collab-Sphere Featured Collaborators</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-dark: #0a192f;
            --secondary-dark: #172a45;
            --accent-blue: #64ffda;
            --text-light: #ccd6f6;
            --text-muted: #8892b0;
            --card-shadow: 0 10px 30px -15px rgba(2, 12, 27, 0.7);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background-color: var(--primary-dark);
            color: var(--text-light);
        }
        
        .collaborators-carousel {
            background-color: #112240;
            padding: 80px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .carousel-header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .carousel-header h2 {
            font-size: 2.2rem;
            color: var(--text-light);
            margin-bottom: 15px;
            position: relative;
            display: inline-block;
        }
        
        .carousel-header h2::after {
            content: '';
            display: block;
            width: 80px;
            height: 3px;
            background-color: var(--accent-blue);
            margin: 15px auto 0;
        }
        
        .carousel-header p {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.6;
        }
        
        .search-filter {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .search-box {
            padding: 12px 20px;
            border: 1px solid var(--text-muted);
            border-radius: 5px;
            width: 350px;
            max-width: 100%;
            font-size: 1rem;
            background-color: var(--secondary-dark);
            color: var(--text-light);
            transition: all 0.3s ease;
        }
        
        .search-box:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(100, 255, 218, 0.2);
        }
        
        .filter-select {
            padding: 12px 20px;
            border: 1px solid var(--text-muted);
            border-radius: 5px;
            background-color: var(--secondary-dark);
            color: var(--text-light);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .filter-select:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(100, 255, 218, 0.2);
        }
        
        .carousel-container {
            position: relative;
            margin: 0 auto;
            max-width: 1000px;
            overflow: hidden;
        }
        
        .carousel-slide {
            display: flex;
            transition: transform 0.5s ease;
            width: 100%;
        }
        
        .slide-group {
            display: flex;
            flex: 0 0 100%;
            gap: 30px;
            padding: 10px;
            box-sizing: border-box;
            justify-content: center;
        }
        
        .profile-card {
            background: var(--secondary-dark);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            width: 300px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        
        .profile-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 25px -10px rgba(2, 12, 27, 0.8);
        }
        
        .profile-header {
            height: 120px;
            background: linear-gradient(135deg, #112240, #1b3a6a);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .profile-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid var(--accent-blue);
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .profile-info {
            padding: 70px 25px 25px;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .profile-name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-light);
        }
        
        .profile-title {
            color: var(--accent-blue);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        
        .profile-bio {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.6;
            flex: 1;
        }
        
        .profile-skills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .skill-tag {
            background-color: rgba(100, 255, 218, 0.1);
            color: var(--accent-blue);
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.8rem;
        }
        
        .profile-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: auto;
        }
        
        .action-btn {
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .contact-btn {
            background-color: transparent;
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
        }
        
        .contact-btn:hover {
            background-color: rgba(100, 255, 218, 0.1);
        }
        
        .github-btn {
            background-color: transparent;
            color: var(--text-light);
            border: 1px solid var(--text-muted);
        }
        
        .github-btn:hover {
            background-color: rgba(136, 146, 176, 0.1);
        }
        
        .carousel-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }
        
        .carousel-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .carousel-dot.active {
            background-color: var(--accent-blue);
            transform: scale(1.2);
        }
        
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(10, 25, 47, 0.7);
            color: var(--accent-blue);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            border: 1px solid var(--accent-blue);
        }
        
        .carousel-btn:hover {
            background: var(--accent-blue);
            color: var(--primary-dark);
        }
        
        .carousel-prev {
            left: 20px;
        }
        
        .carousel-next {
            right: 20px;
        }
        
        @media (max-width: 1024px) {
            .profile-card {
                width: 280px;
            }
            
            .slide-group {
                justify-content: flex-start;
                padding-left: 50px;
                padding-right: 50px;
            }
        }
        
        @media (max-width: 768px) {
            .collaborators-carousel {
                padding: 60px 15px;
            }
            
            .carousel-header h2 {
                font-size: 1.8rem;
            }
            
            .carousel-header p {
                font-size: 1rem;
            }
            
            .search-filter {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
            
            .search-box, .filter-select {
                width: 100%;
                max-width: 400px;
            }
            
            .slide-group {
                justify-content: center;
                padding-left: 20px;
                padding-right: 20px;
            }
            
            .profile-card {
                width: 100%;
                max-width: 350px;
            }
            
            .carousel-btn {
                width: 30px;
                height: 30px;
                font-size: 1rem;
            }
            
            .carousel-prev {
                left: 5px;
            }
            
            .carousel-next {
                right: 5px;
            }
        }
        
        @media (max-width: 480px) {
            .profile-info {
                padding: 70px 15px 20px;
            }
            
            .profile-actions {
                flex-direction: column;
                gap: 10px;
            }
            
            .action-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <section class="collaborators-carousel">
        <div class="carousel-header">
            <h2>Featured Collaborators</h2>
            <p>Connect with talented developers and build amazing projects together</p>
        </div>
        
        <div class="search-filter">
            <input type="text" class="search-box" placeholder="Search by name or skills..." id="profileSearch">
            <select class="filter-select" id="skillFilter">
                <option value="">All Skills</option>
                <option value="JavaScript">JavaScript</option>
                <option value="Python">Python</option>
                <option value="React">React</option>
                <option value="Node.js">Node.js</option>
                <option value="UI/UX">UI/UX</option>
            </select>
        </div>
        
        <div class="carousel-container">
            <button class="carousel-btn carousel-prev"><i class="fas fa-chevron-left"></i></button>
            <button class="carousel-btn carousel-next"><i class="fas fa-chevron-right"></i></button>
            
            <div class="carousel-slide" id="carouselSlide">
                <!-- Profile cards will be inserted here by JavaScript -->
            </div>
            
            <div class="carousel-nav" id="carouselNav">
                <!-- Navigation dots will be inserted here by JavaScript -->
            </div>
        </div>
    </section>

    <script>
        // Sample profile data
        const profiles = [
            {
                id: 1,
                name: "Alex Johnson",
                title: "Full Stack Developer",
                bio: "Passionate about building scalable web applications with clean architecture.",
                skills: ["JavaScript", "React", "Node.js"],
                github: "https://github.com/alexjohnson",
                avatar: "https://avatars.githubusercontent.com/u/1234567?v=4"
            },
            {
                id: 2,
                name: "Sarah Chen",
                title: "Frontend Engineer",
                bio: "UI/UX specialist focused on creating responsive and accessible interfaces.",
                skills: ["React", "TypeScript", "Figma"],
                github: "https://github.com/sarahchen",
                avatar: "https://avatars.githubusercontent.com/u/2345678?v=4"
            },
            {
                id: 3,
                name: "Miguel Rodriguez",
                title: "Backend Developer",
                bio: "API development expert with experience in database optimization.",
                skills: ["Python", "Django", "PostgreSQL"],
                github: "https://github.com/miguelrod",
                avatar: "https://avatars.githubusercontent.com/u/3456789?v=4"
            },
            {
                id: 4,
                name: "Priya Patel",
                title: "DevOps Engineer",
                bio: "Cloud infrastructure specialist with CI/CD pipeline expertise.",
                skills: ["Docker", "Kubernetes", "AWS"],
                github: "https://github.com/priyadevops",
                avatar: "https://avatars.githubusercontent.com/u/4567890?v=4"
            },
            {
                id: 5,
                name: "James Wilson",
                title: "Mobile Developer",
                bio: "Building cross-platform applications with Flutter and React Native.",
                skills: ["Flutter", "Dart", "Firebase"],
                github: "https://github.com/jamesmobile",
                avatar: "https://avatars.githubusercontent.com/u/5678901?v=4"
            },
            {
                id: 6,
                name: "Emma Davis",
                title: "Data Scientist",
                bio: "Machine learning practitioner and data visualization expert.",
                skills: ["Python", "Pandas", "TensorFlow"],
                github: "https://github.com/emmadatasci",
                avatar: "https://avatars.githubusercontent.com/u/6789012?v=4"
            },
            {
                id: 7,
                name: "David Kim",
                title: "Frontend Architect",
                bio: "React expert focused on performance optimization.",
                skills: ["React", "TypeScript", "Next.js"],
                github: "https://github.com/davidkim",
                avatar: "https://avatars.githubusercontent.com/u/7890123?v=4"
            },
            {
                id: 8,
                name: "Lisa Wong",
                title: "QA Engineer",
                bio: "Building robust test suites for web applications.",
                skills: ["Cypress", "Jest", "Testing"],
                github: "https://github.com/lisawong",
                avatar: "https://avatars.githubusercontent.com/u/8901234?v=4"
            }
        ];

        // Carousel state
        let currentSlide = 0;
        const profilesPerSlide = 3;
        const totalSlides = Math.ceil(profiles.length / profilesPerSlide);
        
        // DOM elements
        const carouselSlide = document.getElementById('carouselSlide');
        const carouselNav = document.getElementById('carouselNav');
        const prevBtn = document.querySelector('.carousel-prev');
        const nextBtn = document.querySelector('.carousel-next');
        const profileSearch = document.getElementById('profileSearch');
        const skillFilter = document.getElementById('skillFilter');
        
        // Initialize carousel
        function initCarousel() {
            renderCarousel();
            renderNavDots();
            addEventListeners();
        }
        
        // Render carousel slides
        function renderCarousel(filteredProfiles = profiles) {
            carouselSlide.innerHTML = '';
            const filtered = filteredProfiles || profiles;
            const newTotalSlides = Math.ceil(filtered.length / profilesPerSlide);
            
            // Create groups of profiles
            for (let i = 0; i < newTotalSlides; i++) {
                const slideProfiles = filtered.slice(i * profilesPerSlide, (i + 1) * profilesPerSlide);
                const slideGroup = document.createElement('div');
                slideGroup.className = 'slide-group';
                slideGroup.style.transform = `translateX(${i * 100}%)`;
                
                slideProfiles.forEach(profile => {
                    slideGroup.innerHTML += `
                        <div class="profile-card">
                            <div class="profile-header">
                                <img src="${profile.avatar}" alt="${profile.name}" class="profile-avatar">
                            </div>
                            <div class="profile-info">
                                <h3 class="profile-name">${profile.name}</h3>
                                <p class="profile-title">${profile.title}</p>
                                <p class="profile-bio">${profile.bio}</p>
                                <div class="profile-skills">
                                    ${profile.skills.map(skill => `<span class="skill-tag">${skill}</span>`).join('')}
                                </div>
                                <div class="profile-actions">
                                    <button class="action-btn contact-btn" onclick="contactUser(${profile.id})">
                                        <i class="fas fa-envelope"></i> Contact
                                    </button>
                                    <button class="action-btn github-btn" onclick="window.open('${profile.github}', '_blank')">
                                        <i class="fab fa-github"></i> GitHub
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                carouselSlide.appendChild(slideGroup);
            }
            
            currentSlide = 0;
            updateCarousel();
            renderNavDots(filtered);
        }
        
        // Render navigation dots
        function renderNavDots(filteredProfiles = profiles) {
            carouselNav.innerHTML = '';
            const filtered = filteredProfiles || profiles;
            const newTotalSlides = Math.ceil(filtered.length / profilesPerSlide);
            
            for (let i = 0; i < newTotalSlides; i++) {
                const dot = document.createElement('div');
                dot.className = 'carousel-dot';
                if (i === currentSlide) dot.classList.add('active');
                dot.addEventListener('click', () => goToSlide(i));
                carouselNav.appendChild(dot);
            }
        }
        
        // Add event listeners
        function addEventListeners() {
            prevBtn.addEventListener('click', () => {
                const filtered = filterProfiles();
                const newTotalSlides = Math.ceil(filtered.length / profilesPerSlide);
                currentSlide = (currentSlide - 1 + newTotalSlides) % newTotalSlides;
                updateCarousel();
            });
            
            nextBtn.addEventListener('click', () => {
                const filtered = filterProfiles();
                const newTotalSlides = Math.ceil(filtered.length / profilesPerSlide);
                currentSlide = (currentSlide + 1) % newTotalSlides;
                updateCarousel();
            });
            
            profileSearch.addEventListener('input', () => {
                renderCarousel(filterProfiles());
            });
            
            skillFilter.addEventListener('change', () => {
                renderCarousel(filterProfiles());
            });
        }
        
        // Update carousel position
        function updateCarousel() {
            const slideGroups = document.querySelectorAll('.slide-group');
            slideGroups.forEach((group, index) => {
                group.style.transform = `translateX(${(index - currentSlide) * 100}%)`;
            });
            
            // Update active dot
            const dots = document.querySelectorAll('.carousel-dot');
            dots.forEach((dot, index) => {
                if (index === currentSlide) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }
        
        // Go to specific slide
        function goToSlide(slideIndex) {
            currentSlide = slideIndex;
            updateCarousel();
        }
        
        // Contact user function
        function contactUser(userId) {
            const profile = profiles.find(p => p.id === userId);
            if (profile) {
                alert(`Contacting ${profile.name} through Collab-Sphere messaging system.`);
            }
        }
        
        // Filter profiles based on search and skill filter
        function filterProfiles() {
            const searchTerm = profileSearch.value.toLowerCase();
            const selectedSkill = skillFilter.value;
            
            return profiles.filter(profile => {
                const matchesSearch = 
                    profile.name.toLowerCase().includes(searchTerm) ||
                    profile.bio.toLowerCase().includes(searchTerm) ||
                    profile.skills.some(skill => skill.toLowerCase().includes(searchTerm));
                
                const matchesSkill = 
                    !selectedSkill || 
                    profile.skills.some(skill => skill === selectedSkill);
                
                return matchesSearch && matchesSkill;
            });
        }
        
        // Initialize on DOM load
        document.addEventListener('DOMContentLoaded', initCarousel);

        
    </script>
</body>
</html>
