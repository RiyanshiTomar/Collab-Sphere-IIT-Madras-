<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Collab-Sphere Discussion</title>
  <style>
    :root {
      --primary: #00aaff;
      --background: #0c0c1b;
      --card: #1c1c2b;
      --text-light: #f1f1f1;
      --text-muted: #bbb;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: var(--background);
      color: var(--text-light);
    }

    header {
      text-align: center;
      padding: 40px 20px 20px;
    }

    header h1 {
      font-size: 2.8em;
      color: var(--primary);
    }

    header p {
      color: var(--text-muted);
      font-size: 1.2em;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .form-section {
      background-color: var(--card);
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 30px;
    }

    .form-section h2 {
      margin-bottom: 15px;
    }

    input, textarea {
      width: 100%;
      background: #2a2a3d;
      border: 1px solid #444;
      color: white;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
    }

    button {
      background: var(--primary);
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }

    button:hover {
      background: #008ecc;
    }

    .posts {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .post {
      background: var(--card);
      padding: 20px;
      border-radius: 10px;
      border-left: 5px solid var(--primary);
    }

    .post h3 {
      margin-bottom: 5px;
      color: var(--primary);
    }

    .post p {
      margin-bottom: 10px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .actions button {
      background: #2a2a3d;
      border: 1px solid #444;
      color: var(--text-muted);
      font-size: 0.9em;
      padding: 6px 12px;
      border-radius: 6px;
    }

    .actions button.active {
      background-color: var(--primary);
      color: white;
    }

    .comments {
      margin-top: 15px;
      border-top: 1px solid #333;
      padding-top: 10px;
    }

    .comments p {
      margin: 6px 0;
      font-size: 0.9em;
      color: #ccc;
    }

    .comment-box {
      margin-top: 10px;
      display: flex;
      gap: 10px;
    }

    .comment-box input {
      flex: 1;
      padding: 8px;
      font-size: 0.9em;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 2em;
      }

      .form-section h2 {
        font-size: 1.5em;
      }

      button {
        width: 100%;
      }

      .comment-box {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Collab-Sphere</h1>
    <p>Discuss ideas, give feedback, and grow together!</p>
  </header>

  <div class="container">
    <div class="form-section">
      <h2>Create a Post</h2>
      <input type="text" id="postTitle" placeholder="Post Title" />
      <textarea id="postContent" placeholder="What's on your mind?" rows="3"></textarea>
      <button onclick="createPost()">Create Post</button>
    </div>

    <div class="posts" id="postList"></div>
  </div>

  <script>
    function createPost() {
      const title = document.getElementById('postTitle').value.trim();
      const content = document.getElementById('postContent').value.trim();

      if (!title || !content) {
        alert("Please fill both title and content.");
        return;
      }

      const postDiv = document.createElement('div');
      postDiv.className = 'post';
      postDiv.innerHTML = `
        <h3>${title}</h3>
        <p>${content}</p>
        <div class="actions">
          <button onclick="toggleLike(this)">👍 Like (<span>0</span>)</button>
          <button onclick="toggleInterest(this)">⭐ Interested</button>
        </div>
        <div class="comments">
          <strong>Comments:</strong>
          <div class="comment-list"></div>
          <div class="comment-box">
            <input type="text" placeholder="Write a comment..." onkeydown="handleComment(event, this)" />
            <button onclick="addComment(this)">Reply</button>
          </div>
        </div>
      `;

      document.getElementById('postList').prepend(postDiv);

      // Clear inputs
      document.getElementById('postTitle').value = '';
      document.getElementById('postContent').value = '';
    }

    function toggleLike(btn) {
      const span = btn.querySelector('span');
      let count = parseInt(span.textContent);
      if (btn.classList.contains('active')) {
        count--;
        btn.classList.remove('active');
      } else {
        count++;
        btn.classList.add('active');
      }
      span.textContent = count;
    }

    function toggleInterest(btn) {
      btn.classList.toggle('active');
    }

    function handleComment(event, input) {
      if (event.key === 'Enter') {
        addComment(input.nextElementSibling);
      }
    }

    function addComment(button) {
      const input = button.previousElementSibling;
      const text = input.value.trim();
      if (!text) return;

      const commentList = button.closest('.comments').querySelector('.comment-list');
      const p = document.createElement('p');
      p.textContent = text;
      commentList.appendChild(p);
      input.value = '';
    }
  </script>

</body>
</html>
